<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">JSON Web Token Authentication Flow</title>
  <desc id="desc">A simple diagram showing a user logging in, the server creating a JWT, and the app using the token for protected routes.</desc>

  <rect width="1200" height="630" fill="#050807"/>
  <circle cx="160" cy="110" r="180" fill="#34d399" opacity="0.16"/>
  <circle cx="1060" cy="520" r="220" fill="#10b981" opacity="0.13"/>

  <rect x="80" y="80" width="1040" height="470" rx="34" fill="#0b1310" stroke="#1f3d32" stroke-width="3"/>

  <text x="600" y="155" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="700" fill="#ecfdf5">
    JSON Web Tokens
  </text>

  <text x="600" y="198" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="25" fill="#a7f3d0">
    How apps verify a logged-in user
  </text>

  <rect x="135" y="285" width="220" height="120" rx="24" fill="#10231d" stroke="#6ee7b7" stroke-width="3"/>
  <text x="245" y="335" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="700" fill="#d1fae5">
    User
  </text>
  <text x="245" y="372" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#a7f3d0">
    logs in
  </text>

  <rect x="490" y="285" width="220" height="120" rx="24" fill="#10231d" stroke="#6ee7b7" stroke-width="3"/>
  <text x="600" y="335" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="700" fill="#d1fae5">
    Server
  </text>
  <text x="600" y="372" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#a7f3d0">
    creates JWT
  </text>

  <rect x="845" y="285" width="220" height="120" rx="24" fill="#10231d" stroke="#6ee7b7" stroke-width="3"/>
  <text x="955" y="335" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="700" fill="#d1fae5">
    Protected
  </text>
  <text x="955" y="372" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#a7f3d0">
    routes
  </text>

  <line x1="365" y1="345" x2="470" y2="345" stroke="#6ee7b7" stroke-width="6" stroke-linecap="round"/>
  <polygon points="470,345 446,331 446,359" fill="#6ee7b7"/>

  <line x1="720" y1="345" x2="825" y2="345" stroke="#6ee7b7" stroke-width="6" stroke-linecap="round"/>
  <polygon points="825,345 801,331 801,359" fill="#6ee7b7"/>

  <rect x="290" y="455" width="620" height="52" rx="26" fill="#ecfdf5" opacity="0.08" stroke="#6ee7b7" stroke-width="2"/>
  <text x="600" y="489" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#d1fae5">
    Login → Token → Verified Access
  </text>
</svg>
